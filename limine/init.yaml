services:
- name: vfsd
  path: /vfsd.elf
  description: Virtual Filesystem Service
  run_type: ALWAYS_ONCE

- name: terminald
  path: /terminald.elf
  description: Terminal Service
  run_type: ALWAYS_ONCE
- name: vfatfsd
  path: /vfatfsd.elf
  description: VFAT Filesystem Service
  run_type: ALWAYS_ONCE

- name: devicesd
  path: /devicesd.elf
  description: Devices Server
  run_type: ALWAYS_ONCE

- name: ns16550
  path: /ns16550.elf
  description: NS16550 UART Driver
  run_type: ALWAYS_ONCE

- name: logd
  path: /logd.elf
  description: Logging Server
  run_type: ALWAYS_ONCE

- name: piped
  path: /piped.elf
  description: Unix pipes server
  run_type: ALWAYS_ONCE

- name: processd
  path: /processd.elf
  description: Unix process server
  run_type: ALWAYS_ONCE

- name: ahcid
  path: /ahcid.elf
  description: AHCI disk driver
  run_type: FOR_EACH_MATCH
  match:
    pci:
      class: 0x1
      subclass: 0x6
      interface: 0x1

- name: ps2d
  path: /ps2d.elf
  description: PS/2 driver
  run_type: RUN_MANUAL

- name: blockd
  path: /blockd.elf
  description: Block Device Service
  run_type: ALWAYS_ONCE

- name: pmbus
  path: /pmbus
  description: pmbus capabilities discovery server
  run_type: ALWAYS_ONCE

- name: i8042
  path: /i8042.elf
  require:
  - ps2d
  description: i8042 PS/2 controller driver
  run_type: FIRST_MATCH_ONCE
  match:
    pnp:
      ["PNP0300", "PNP0301", "PNP0302", "PNP0303", "PNP0304", "PNP0305", "PNP0306", "PNP0307", "PNP0308", "PNP0309", "PNP030A", "PNP030B", "PNP0320", "PNP0321", "PNP0322", "PNP0323", "PNP0324", "PNP0325", "PNP0326", "PNP0327", "PNP0340", "PNP0341", "PNP0342", "PNP0343", "PNP0344", "PNP0F00", "PNP0F01", "PNP0F02", "PNP0F03", "PNP0F04", "PNP0F05", "PNP0F06", "PNP0F07", "PNP0F08", "PNP0F09", "PNP0F0A", "PNP0F0B", "PNP0F0C", "PNP0F0D", "PNP0F0E", "PNP0F0F", "PNP0F10", "PNP0F11", "PNP0F12", "PNP0F13", "PNP0F14", "PNP0F15", "PNP0F16", "PNP0F17", "PNP0F18", "PNP0F19", "PNP0F1A", "PNP0F1B", "PNP0F1C", "PNP0F1D", "PNP0F1E", "PNP0F1F", "PNP0F20", "PNP0F21", "PNP0F22", "PNP0F23", "PNP0FFC", "PNP0FFF"]