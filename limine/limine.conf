# Timeout in seconds that Limine will use before automatically booting.
timeout: 1
 
# # The entry name that will be displayed in the boot menu.
/pmOS (KASLR off)
    # We use the Limine boot protocol.
    protocol: limine

    kaslr: no
 
    # Path to the kernel to boot. boot:/// represents the partition on which limine.cfg is located.
    kernel_path: boot():/kernel

    module_path: boot():/bootstrapd.elf
    module_cmdline: bootstrap

    module_path: boot():/vfsd.elf
    module_cmdline: {"service": {"name": "vfsd", "description": "Virtual Filesystem Service", "run_type": "ALWAYS_ONCE"}}
 
    module_path: boot():/terminald.elf
    module_cmdline: {"service": {"name": "terminald", "description": "Terminal Service", "run_type": "ALWAYS_ONCE"}}

    module_path: boot():/vfatfsd.elf
    module_cmdline: {"service": {"name": "vfatfsd", "description": "VFAT Filesystem Service", "run_type": "ALWAYS_ONCE"}}

    module_path: boot():/devicesd.elf
    module_cmdline: {"service": {"name": "devicesd", "description": "Device Service", "run_type": "ALWAYS_ONCE"}}

    module_path: boot():/ns16550.elf
    module_cmdline: {"service": {"name": "ns16550", "description": "NS16550 UART Driver", "run_type": "FIRST_MATCH_ONCE"}}

    module_path: boot():/logd.elf
    module_cmdline: {"service": {"name": "logd", "description": "Logging Service", "run_type": "ALWAYS_ONCE"}}

    module_path: boot():/piped.elf
    module_cmdline: {"service": {"name": "piped", "description": "Piped Service", "run_type": "ALWAYS_ONCE"}}

    module_path: boot():/processd.elf
    module_cmdline: {"service": {"name": "processd", "description": "Process Service", "run_type": "ALWAYS_ONCE"}}

    # module_path: boot():/ahcid.elf
    # module_cmdline: init

    module_path: boot():/ps2d.elf
    module_cmdline: {"service": {"name": "ps2d", "description": "PS/2 Driver", "run_type": "RUN_MANUAL"}}

    module_path: boot():/blockd.elf
    module_cmdline: {"service": {"name": "blockd", "description": "Block Device Service", "run_type": "ALWAYS_ONCE"}}

    # module_path: boot():/ext2fsd
    # module_cmdline: init

    module_path: boot():/pmbus
    module_cmdline: {"service": {"name": "pmbus", "description": "PMBus Driver", "run_type": "ALWAYS_ONCE"}}

    module_path: boot():/i8042.elf
    module_cmdline: {"service": {"require": ["ps2d"], "name": "i8042", "description": "i8042 controller driver", "run_type": "FIRST_MATCH_ONCE", "match": {"pnp": ["PNP0300", "PNP0301", "PNP0302", "PNP0303", "PNP0304", "PNP0305", "PNP0306", "PNP0307", "PNP0308", "PNP0309", "PNP030A", "PNP030B", "PNP0320", "PNP0321", "PNP0322", "PNP0323", "PNP0324", "PNP0325", "PNP0326", "PNP0327", "PNP0340", "PNP0341", "PNP0342", "PNP0343", "PNP0344", "PNP0F00", "PNP0F01", "PNP0F02", "PNP0F03", "PNP0F04", "PNP0F05", "PNP0F06", "PNP0F07", "PNP0F08", "PNP0F09", "PNP0F0A", "PNP0F0B", "PNP0F0C", "PNP0F0D", "PNP0F0E", "PNP0F0F", "PNP0F10", "PNP0F11", "PNP0F12", "PNP0F13", "PNP0F14", "PNP0F15", "PNP0F16", "PNP0F17", "PNP0F18", "PNP0F19", "PNP0F1A", "PNP0F1B", "PNP0F1C", "PNP0F1D", "PNP0F1E", "PNP0F1F", "PNP0F20", "PNP0F21", "PNP0F22", "PNP0F23", "PNP0FFC", "PNP0FFF"]}}}

# Same thing, but without KASLR.
/pmOS (KASLR on)
    # We use the Limine boot protocol.
    protocol: limine

    kaslr: yes
 
    # Path to the kernel to boot. boot:/// represents the partition on which limine.cfg is located.
    kernel_path: boot():/kernel

    module_path: boot():/bootstrapd.elf
    module_cmdline: bootstrap

    module_path: boot():/vfsd.elf
    module_cmdline: init
 
    module_path: boot():/terminald.elf
    module_cmdline: init

    module_path: boot():/vfatfsd.elf
    module_cmdline: init

    module_path: boot():/devicesd.elf
    module_cmdline: init

    module_path: boot():/ns16550.elf
    module_cmdline: init

    module_path: boot():/logd.elf
    module_cmdline: init

    module_path: boot():/piped.elf
    module_cmdline: init

    module_path: boot():/processd.elf
    module_cmdline: init

    # module_path: boot():/ahcid.elf
    # module_cmdline: init

    module_path: boot():/ps2d.elf
    module_cmdline: init

    module_path: boot():/blockd.elf
    module_cmdline: init

    module_path: boot():/pmbus
    module_cmdline: init
